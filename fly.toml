# fly.toml app configuration file generated for kiro-gateway on 2026-03-04T07:57:25+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kiro-gateway'
primary_region = 'sin'

[build]

[env]
  # Timeout settings - increased for slow Kiro API responses
  FIRST_TOKEN_TIMEOUT = "30"
  STREAMING_READ_TIMEOUT = "120"
  FIRST_TOKEN_MAX_RETRIES = "3"
  
  # Optional: Disable fake reasoning to reduce latency
  FAKE_REASONING = "false"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
